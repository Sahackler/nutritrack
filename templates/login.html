{% extends "base.html" %}
{% block title %}Login - NutriTrack{% endblock %}
{% block content %}

<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
      <div class="bg-gradient-to-r from-gray-800 to-gray-900 px-8 py-8 text-center">
        <div class="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center mx-auto mb-3">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-white">Welcome Back</h1>
        <p class="text-gray-400 text-sm mt-1">Log in to your NutriTrack account</p>
      </div>

      <form method="POST" action="/login" class="px-8 py-6 space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Username or Email</label>
          <input
            type="text" name="identifier" required autocomplete="username"
            placeholder="Your username or email"
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition"
          />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
          <input
            type="password" name="password" required autocomplete="current-password"
            placeholder="Your password"
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition"
          />
        </div>
        <button type="submit" class="w-full bg-gray-900 hover:bg-gray-800 text-white font-bold py-3 rounded-xl transition-colors mt-2">
          Log In
        </button>
      </form>

      <div class="px-8 pb-6 text-center">
        <p class="text-sm text-gray-500">Don't have an account?
          <a href="/register" class="text-emerald-600 font-semibold hover:underline">Sign up free</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
