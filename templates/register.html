{% extends "base.html" %}
{% block title %}Register - NutriTrack{% endblock %}
{% block content %}

<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
      <div class="bg-gradient-to-r from-emerald-500 to-emerald-600 px-8 py-8 text-center">
        <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-3">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-white">Create an Account</h1>
        <p class="text-emerald-100 text-sm mt-1">Join NutriTrack for free</p>
      </div>

      <form method="POST" action="/register" class="px-8 py-6 space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
          <input
            type="text" name="username" required autocomplete="username"
            placeholder="Choose a username"
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition"
          />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
          <input
            type="email" name="email" required autocomplete="email"
            placeholder="you@example.com"
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition"
          />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
          <input
            type="password" name="password" required autocomplete="new-password"
            placeholder="At least 6 characters"
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition"
          />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Confirm Password</label>
          <input
            type="password" name="confirm" required autocomplete="new-password"
            placeholder="Repeat your password"
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition"
          />
        </div>
        <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl transition-colors mt-2">
          Create Account
        </button>
      </form>

      <div class="px-8 pb-6 text-center">
        <p class="text-sm text-gray-500">Already have an account?
          <a href="/login" class="text-emerald-600 font-semibold hover:underline">Log in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
